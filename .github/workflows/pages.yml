name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # The landing site (marketing page + privacy policy) at the Pages root.
      - name: Collect landing site files
        run: |
          mkdir -p _site
          cp index.html 404.html manifest.json sw.js robots.txt privacy.html _site/ 2>/dev/null || true
          cp icon-192.png icon-512.png _site/ 2>/dev/null || true
          ls -la _site

      # The actual app, built for the browser and served under /app so it
      # never touches the landing page or privacy policy at the root. The web
      # base path is set by experiments.baseUrl in mobile/app.json.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      # The app build is allowed to fail without blocking the deploy: the
      # landing page and privacy policy at the root must always ship (Play
      # requires the privacy URL to stay reachable), so a broken web export
      # can never hold them hostage. If the export fails, the last good /app
      # stays live from the previous deploy.
      - name: Build the web app
        id: webapp
        continue-on-error: true
        working-directory: mobile
        run: |
          npm ci
          npx expo export --platform web
      - name: Place the web app under /app
        if: steps.webapp.outcome == 'success'
        run: |
          mkdir -p _site/app
          cp -r mobile/dist/. _site/app/
          # Single page app: any unknown /app/... path should still boot the
          # app so a refresh or a direct link does not dead end.
          cp mobile/dist/index.html _site/app/404.html
          ls -la _site/app
      - name: Note a skipped app build
        if: steps.webapp.outcome != 'success'
        run: echo "Web app export failed; deploying the landing site only. The previous /app stays live."

      # The Flutter rebuild as a live web preview under /flutter, so the
      # founder can watch progress from the phone browser with zero installs
      # (refresh = latest). Same rule as /app: allowed to fail without ever
      # blocking the landing page or privacy policy.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - name: Build the Flutter web preview
        id: flutterweb
        continue-on-error: true
        working-directory: flutter
        run: flutter build web --base-href /Salapify/flutter/
      - name: Place the Flutter preview under /flutter
        if: steps.flutterweb.outcome == 'success'
        run: |
          mkdir -p _site/flutter
          cp -r flutter/build/web/. _site/flutter/
          cp flutter/build/web/index.html _site/flutter/404.html
      - name: Note a skipped Flutter web build
        if: steps.flutterweb.outcome != 'success'
        run: echo "Flutter web build failed; the previous /flutter stays live."

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_attempt }}
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
