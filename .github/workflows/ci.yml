name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

# Deployment to GitHub Pages is handled by the repository's built-in
# "Deploy from a branch" Pages source, which publishes the root of `main`
# automatically on every push. No deploy job is needed here.
#
# To switch to gym-buddy's Actions-based deploy (which only publishes after
# lint + test pass), set Settings -> Pages -> Source to "GitHub Actions" and
# restore the deploy job that stages index.html, 404.html, robots.txt,
# manifest.json, sw.js and the icons into _site/ via actions/deploy-pages.
