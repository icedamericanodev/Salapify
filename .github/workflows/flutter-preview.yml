# Flutter preview pipeline. Every push that touches flutter/ builds a signed
# APK on GitHub's free runners and publishes it to ONE fixed release tag,
# flutter-preview. The founder bookmarks that release page on the phone: each
# new build replaces the APK there, and because every build is signed with the
# committed preview key, the new APK installs OVER the old one in place.
# This runs on GitHub's free runner minutes, not the EAS allowance.

name: Flutter preview APK

on:
  push:
    branches:
      - claude/salapify-v2
      - main
    paths:
      - 'flutter/**'
      # This workflow watches its own definition ON PURPOSE. Without this line
      # a push that edits only the publisher triggers nothing at all: no check
      # and no publish, so the shipping mechanism can be broken, or believed
      # fixed, with zero signal until some later push happens to touch
      # flutter/ and fails there. Editing the publisher must exercise the
      # publisher.
      - '.github/workflows/flutter-preview.yml'
  workflow_dispatch:

# One build at a time, and builds QUEUE rather than cancel: a Shorebird
# release or patch in flight must always finish and reach its publish step,
# otherwise a cancelled first release could exist server-side with no base
# APK ever published, leaving every later green run patching a release
# nobody can install.
concurrency:
  group: flutter-preview
  cancel-in-progress: false

permissions:
  contents: write # needed to update the flutter-preview release
  issues: write # needed to say out loud when a build shipped nothing

jobs:
  build:
    name: Analyze, test, build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      # Full history: the delivery-log step rebases onto main before pushing,
      # and a depth-1 checkout cannot rebase.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Analyze (zero tolerance)
        run: flutter analyze

      - name: Test
        run: flutter test

      - uses: shorebirdtech/setup-shorebird@v1

      # Shorebird model: one RELEASE per pubspec version (the base APK the
      # founder installs once), then every later push PATCHES that release
      # over the air, applied when the app restarts. Bump the pubspec version
      # only for native-level changes; that forces a new release and one
      # manual APK install, which the log below calls out loudly.
      - name: Release or patch
        id: ship
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "pubspec version: $VERSION"
          # If the list itself fails (auth, outage), stop loudly rather than
          # guess the wrong branch. Padded match so 0.1.0+1 never matches a
          # future 0.1.0+11 row.
          LIST=$(shorebird releases list) || { echo "shorebird releases list failed; refusing to guess release vs patch."; exit 1; }
          # --no-tree-shake-icons on BOTH commands: with tree-shaking on,
          # using any new Material icon changes the shaken icon-font asset,
          # and Shorebird refuses patches that touch assets
          # (UnpatchableChangeException, the f0.14 failure). Shipping the
          # full icon font in the base costs ~1.6MB once and makes icon
          # changes patchable forever.
          # Output is tee'd so the patch number Shorebird prints ("Published
          # Patch 22!") becomes a machine-readable fact, not something a human
          # has to go read in a log. It is the only place the delivered patch
          # number exists, and it is what the phone shows on the Update stamp
          # row, so it is the one value that lets repo and phone be compared.
          set -o pipefail
          if echo "$LIST" | grep -Fq " $VERSION "; then
            echo "Release $VERSION exists; pushing an over-the-air PATCH."
            shorebird patch android --release-version "$VERSION" --no-confirm -- --no-tree-shake-icons 2>&1 | tee ship.log
            echo "mode=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No release $VERSION yet; building the base APK (founder installs this once)."
            shorebird release android --artifact apk --flutter-version 3.44.6 --no-confirm -- --no-tree-shake-icons 2>&1 | tee ship.log
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi
          PATCH=$(grep -oE 'Published Patch [0-9]+' ship.log | grep -oE '[0-9]+' | tail -1)
          echo "patch=${PATCH:-}" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish the base APK to the fixed flutter-preview release
        if: steps.ship.outputs.mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flutter-preview
          name: Salapify Flutter preview (latest)
          body: |
            The Shorebird-enabled base build. Install this APK ONCE; from then
            on updates patch themselves over the air whenever you reopen the
            app. Check the Update stamp inside the app to confirm which build
            you are on. Built from ${{ github.sha }}.
          prerelease: true
          files: flutter/build/app/outputs/flutter-apk/app-release.apk

      # The delivery record. This exists so "did it actually ship" is answered
      # by reading a file in the repo instead of by interrogating the Actions
      # API, which is slow, easy to get wrong, and unavailable in some
      # sessions. After this, a plain `git pull` tells anyone the stamp and
      # patch number that genuinely reached the phone.
      #
      # It cannot loop: this commit touches only docs/, and this workflow's
      # paths filter is flutter/** plus its own file, so it does not retrigger.
      - name: Record what actually shipped
        if: success() && github.ref == 'refs/heads/main'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MODE: ${{ steps.ship.outputs.mode }}
          PATCH: ${{ steps.ship.outputs.patch }}
          APP_VERSION: ${{ steps.ship.outputs.version }}
        working-directory: .
        run: |
          STAMP=$(grep -oE "'f[0-9]+\.[0-9]+" flutter/lib/main.dart | head -1 | tr -d "'")
          WHEN=$(date -u '+%Y-%m-%d %H:%M UTC')
          mkdir -p docs
          if [ ! -f docs/delivery-log.md ]; then
            {
              echo "# Delivery log"
              echo
              echo "What actually reached the phone, written by the publisher"
              echo "itself after a successful publish. Newest last."
              echo
              echo "A merge with no line here shipped NOTHING, whatever the"
              echo "pull request said. The patch number is the same one the"
              echo "app shows on its Update stamp row, so this file and the"
              echo "phone can be compared directly."
              echo
              echo "| When | Stamp | Patch | Mode | App version | Commit |"
              echo "|------|-------|-------|------|-------------|--------|"
            } > docs/delivery-log.md
          fi
          printf '| %s | %s | %s | %s | %s | [%s](%s) |\n' \
            "$WHEN" "${STAMP:-unknown}" "${PATCH:-none}" "$MODE" \
            "$APP_VERSION" "$(echo "${{ github.sha }}" | cut -c1-8)" "$RUN_URL" \
            >> docs/delivery-log.md
          git config user.name 'salapify-delivery'
          git config user.email 'noreply@github.com'
          git add docs/delivery-log.md
          git commit -m "Delivery: ${STAMP:-unknown}, patch ${PATCH:-none} [skip ci]" || exit 0
          # main may have moved while the build ran; rebase rather than fail,
          # and never force.
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            sleep 5
          done

      # These two steps go LAST on purpose. A notice placed before the publish
      # step cannot report a failure IN the publish step, which is the exact
      # blind spot being closed here.
      #
      # A failed run means the founder got NOTHING, while the pull request
      # still looks clean and merged. That silence is how twelve real failures
      # went unnoticed for thirteen stamps. Make it visible: ONE open issue,
      # commented on rather than duplicated, closed by the next green run so it
      # never rots into noise that gets ignored in turn.
      - name: Say plainly that nothing shipped
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: 'Preview build failed, nothing shipped to the phone'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          BODY=$(printf 'The "Flutter preview APK" run for commit %s failed, so no patch was published and the app on the phone did NOT change, whatever the merged pull request suggests.\n\nFailed run: %s\n\nThis issue closes itself on the next green run.' "$SHA" "$RUN_URL")
          OPEN=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$OPEN" ]; then
            gh issue comment "$OPEN" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi

      - name: Close the nothing-shipped issue now that delivery works again
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: 'Preview build failed, nothing shipped to the phone'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          OPEN=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$OPEN" ]; then
            gh issue close "$OPEN" --comment "Delivery is working again: $RUN_URL published successfully."
          fi
