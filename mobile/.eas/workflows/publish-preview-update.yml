# EAS Workflow: pushes to the v2 branch that change the app publish the
# JavaScript as an over the air update on the "preview" channel. The
# installed preview APK checks this channel when it starts, downloads the
# new code in the background, and runs it on the next open. No rebuild,
# no dev server, no cable. Only changes that add native modules still
# need a real rebuild.
#
# The paths filter skips publishes for pushes that never touch mobile/
# (docs, working rules, ads), so those stop wasting a spot in the queue.

name: Publish preview update

on:
  push:
    branches:
      - claude/salapify-v2
    paths:
      - 'mobile/**'

jobs:
  publish_update:
    name: Publish update
    type: update
    params:
      branch: preview
