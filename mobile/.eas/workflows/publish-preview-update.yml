# EAS Workflow: every push to the v2 branch publishes the JavaScript as an
# over the air update on the "preview" channel. The installed preview APK
# checks this channel when it starts, downloads the new code in the
# background, and runs it on the next open. No rebuild, no dev server, no
# cable. Only changes that add native modules still need a real rebuild.

name: Publish preview update

on:
  push:
    branches:
      - claude/salapify-v2

jobs:
  publish_update:
    name: Publish update
    type: update
    params:
      branch: preview
