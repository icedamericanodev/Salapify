    :root, html[data-theme="light"]{
      color-scheme:light;
      --bg:#FFF6F1; --surface:#FFFFFF; --surface-2:#FFF1E8; --text:#3A2E2A; --muted:#A2918A; --faint:#C7B9B0;

    html[data-theme="dark"]{

      --bg:#0E1116; --surface:#191F29; --surface-2:#232B36; --text:#E9ECF2; --muted:#95A0B2; --faint:#6B7686;

      --header-grad:linear-gradient(155deg,#212C40 0%,#0E1116 72%);
      --green-tint:rgba(52,211,154,.16); --green-ink:#6EE7B7; --red-tint:rgba(255,107,107,.16); --red-ink:#FCA5A5;
      --blue-tint:rgba(107,155,255,.17); --blue-ink:#BFD3FF; --amber-tint:rgba(245,166,35,.16); --amber-ink:#FBCF8F;

    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg)}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    input,select,button,textarea{font-family:inherit;font-size:inherit}

    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    #toast{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;max-width:90vw}
    #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;z-index:500}
    #modal-inner{background:var(--surface);width:100%;max-width:640px;border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));max-height:92dvh;overflow-y:auto}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
    .inp{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box}
    .inp:focus{outline:2px solid #1D9E75;outline-offset:1px}
    .lbl{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
    .sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px}
    .row{display:flex;justify-content:space-between;align-items:center}
    .chip{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
    .handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
    #confetti{position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden;display:none}
    .conf{position:absolute;top:-12px;width:9px;height:9px;opacity:.9;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.4}}
    @media print{body>*{display:none!important;}#printArea{display:block!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}

function suggestKey(text,hints){

const CURRENCIES={PHP:{sym:"₱",name:"Philippine Peso"},USD:{sym:"$",name:"US Dollar"},EUR:{sym:"€",name:"Euro"},GBP:{sym:"£",name:"British Pound"},JPY:{sym:"¥",name:"Japanese Yen"},AUD:{sym:"A$",name:"Australian Dollar"},CAD:{sym:"C$",name:"Canadian Dollar"},SGD:{sym:"S$",name:"Singapore Dollar"},HKD:{sym:"HK$",name:"Hong Kong Dollar"},MYR:{sym:"RM",name:"Malaysian Ringgit"},THB:{sym:"฿",name:"Thai Baht"},IDR:{sym:"Rp",name:"Indonesian Rupiah"},VND:{sym:"₫",name:"Vietnamese Dong"},INR:{sym:"₹",name:"Indian Rupee"},AED:{sym:"AED ",name:"UAE Dirham"},SAR:{sym:"SAR ",name:"Saudi Riyal"}};
let curCode="PHP",curSym="₱";
const p$=n=>curSym+Number(n).toLocaleString("en-PH",{minimumFractionDigits:2});
const r2=n=>parseFloat(Number(n).toFixed(2));
const td=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.random().toString(36).slice(2,6);
// Monthly interest cost of a debt = remaining balance x (monthly rate %)
const monthlyInterest=d=>r2(d.remaining*(d.rate||0)/100);
// Returns open debts ordered by the chosen payoff strategy
function sortedByStrategy(){
  const open=debts.filter(d=>d.remaining>0.01);
  if(strategy==="avalanche"){
    // Highest interest rate first; tie-break by smallest balance
    return open.sort((a,b)=>(b.rate||0)-(a.rate||0)||a.remaining-b.remaining);
  }
  // Snowball: smallest balance first; tie-break by highest rate
  return open.sort((a,b)=>a.remaining-b.remaining||(b.rate||0)-(a.rate||0));
}
// The single debt to focus extra payments on right now
function focusDebt(){return sortedByStrategy()[0]||null;}
// Total of all minimum payments across open debts
function totalMinimums(){return r2(debts.filter(d=>d.remaining>0.01).reduce((s,d)=>s+(d.min||0),0));}
// Total monthly interest being charged across all open debts
function totalMonthlyInterest(){return r2(debts.reduce((s,d)=>s+monthlyInterest(d),0));}
function otherAssetsTotal(){return r2(otherAssets.reduce((s,a)=>s+(a.value||0),0));}
function savingsTotal(){return r2(savings.reduce((s,sv)=>s+savingsBalance(sv),0));}
// Auto-create this month's expense for each recurring bill if not already added
function applyRecurring(){
  const ym=ymKey(new Date());
  let added=0;
  recurring.forEach(t=>{
    const exists=expenses.some(e=>e.recurId===t.id&&(e.date||"").startsWith(ym));
    if(!exists){
      const day=String(Math.min(28,Math.max(1,t.day||1))).padStart(2,"0");
      expenses.push({id:uid(),name:t.name,cat:t.cat,amount:r2(t.amount),date:ym+"-"+day,want:!!t.want,recurId:t.id});
      added++;
    }
  });
  if(added>0)save();
  return added;
}

  const ordered=sortedByStrategy();

  const focus=focusDebt();

/* ── BUDGET ─────────────────────────────────── */
function monthExp(){
  return r2(expenses.filter(e=>e.date.startsWith(budgetMonth)).reduce((s,e)=>s+e.amount,0));
}
function monthDebtPaid(){
  return r2(payments.filter(p=>(p.date||"").startsWith(budgetMonth)).reduce((s,p)=>s+p.amount,0));
}
function monthSav(){
  return r2(savings.reduce((s,sv)=>s+(sv.deposits||[]).filter(d=>d.date.startsWith(budgetMonth)&&!d.opening).reduce((a,d)=>a+d.amount,0),0));
}
// Total income for a given month: every recurring source + one-time sources dated that month
function monthIncome(ym){
  ym=ym||budgetMonth;
  return r2(incomes.reduce((s,inc)=>{
    if(inc.recurring)return s+inc.amount;
    if(inc.month===ym)return s+inc.amount;
    return s;
  },0));
}
// Income sources that count toward a given month (recurring + that month's one-offs)
function monthIncomeList(ym){
  ym=ym||budgetMonth;
  return incomes.filter(inc=>inc.recurring||inc.month===ym);
}
// Keep the global `income` in sync with the currently selected month
function recomputeIncome(){income=monthIncome(budgetMonth);}
// Spent so far this month in one category
function catSpent(catKey){
  return r2(expenses.filter(e=>e.cat===catKey&&(e.date||"").startsWith(budgetMonth)).reduce((s,e)=>s+e.amount,0));
}
// 50/30/20 breakdown for the selected month
function get503020(){
  const monthExpenses=expenses.filter(e=>(e.date||"").startsWith(budgetMonth));
  const needs=r2(monthExpenses.filter(e=>!e.want).reduce((s,e)=>s+e.amount,0));
  const wants=r2(monthExpenses.filter(e=>e.want).reduce((s,e)=>s+e.amount,0));
  const saveDebt=r2(monthSav()+monthDebtPaid());
  return {
    needs,wants,saveDebt,income,
    needsTarget:r2(income*0.5),wantsTarget:r2(income*0.3),saveTarget:r2(income*0.2),
    needsPct:income>0?(needs/income)*100:0,
    wantsPct:income>0?(wants/income)*100:0,
    savePct:income>0?(saveDebt/income)*100:0
  };
}

// Reconstruct total debt at the start of each of the last 6 months.
// Debt then = debt now + payments made since (add them back) − credit charged since (it raised the balance).
function getDebtTrend(){
  const now=new Date();
  const curDebt=getNetWorth().liabilities;
  const labels=[],values=[];
  for(let i=5;i>=0;i--){
    const boundary=new Date(now.getFullYear(),now.getMonth()-i,1); // first day of that month
    let payAfter=0,chargeAfter=0;
    payments.forEach(p=>{if(p.date&&new Date(p.date)>=boundary)payAfter+=p.amount;});
    expenses.forEach(e=>{if((e.method||"").startsWith("cc:")&&e.date&&new Date(e.date)>=boundary)chargeAfter+=e.amount;});
    labels.push(boundary.toLocaleDateString("en-PH",{month:"short"}));
    values.push(Math.max(0,r2(curDebt+payAfter-chargeAfter)));
  }
  return {labels,values};
}

  const credit=r2(mExp.filter(e=>(e.method||"").startsWith("cc:")).reduce((s,e)=>s+e.amount,0));

    const maxA=Math.max(1,...acats.map(x=>x[1]),...dcats.map(x=>x[1]));
    const bar=(amt,c)=>`<div style="background:var(--surface-2);height:7px;border-radius:99px;overflow:hidden;margin-top:4px;"><div style="width:${Math.max(2,amt/maxA*100)}%;height:100%;background:${c};border-radius:99px;"></div></div>`;

  // ── Income vs Spending ──
  h+=`<div class="card" style="padding:16px 12px 12px;margin-bottom:16px;">

    </div>`;
  }

  // ── Needs vs Wants ──
  if(spent>0){
    const nMax=Math.max(needs,wants,1);
    h+=`<p class="sec">Needs vs Wants ${mLab}</p>

  // ── Cash vs Credit ──
  if(spent>0){

    </div>`;

    h+=`<div class="card" style="text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;line-height:1.6;">Start logging expenses and payments and your charts will appear here, showing where your money goes and how your debt is moving.</div>`;
  }

  return h;
}

function vGoals(){
  let h=`<div class="row" style="margin-bottom:12px;">
    <span class="sec" style="margin:0;">Financial Goals</span>
    <button onclick="openModal('add-goal')" style="display:flex;align-items:center;gap:5px;background:var(--purple-tint);color:var(--purple-ink);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Add Goal
    </button>
  </div>`;
  if(goals.length){
    goals.forEach(g=>{
      const pct=g.target>0?Math.min(100,(g.current/g.target)*100):0;
      h+=`<div class="card" style="opacity:${g.done?.7:1};">
        <div class="row" style="margin-bottom:8px;">
          <div>
            <p style="font-size:14px;font-weight:700;color:var(--text);margin:0 0 2px;">${g.emoji} ${g.name}</p>
            ${g.deadline?`<p style="font-size:11px;color:var(--muted);margin:0;">Target: ${g.deadline}</p>`:""}
          </div>
          <div style="text-align:right;">
            <p style="font-size:16px;font-weight:700;color:#7C3AED;margin:0;">${p$(g.current)}</p>
            <p style="font-size:10px;color:var(--muted);margin:0;">of ${p$(g.target)}</p>
          </div>
        </div>
        <div style="background:var(--purple-tint);border-radius:99px;height:6px;overflow:hidden;margin-bottom:6px;">
          <div style="height:100%;width:${pct}%;background:#7C3AED;border-radius:99px;"></div>
        </div>
        <div class="row" style="font-size:10px;color:var(--muted);">
          <span>${pct.toFixed(0)}% there${g.done?" · ✅ Achieved!":""}</span>
          <div style="display:flex;gap:6px;">
            <button onclick="addToGoal('${g.id}')" style="border:none;background:var(--purple-tint);color:var(--purple-ink);font-size:10px;cursor:pointer;padding:3px 9px;border-radius:5px;font-weight:600;">+ Add</button>
            <button onclick="toggleGoal('${g.id}')" style="border:none;background:var(--surface-2);color:var(--muted);font-size:10px;cursor:pointer;padding:3px 9px;border-radius:5px;">${g.done?"Undo":"Done ✓"}</button>
            <button onclick="delGoal('${g.id}')" style="border:1px solid var(--border);background:none;color:#D85A30;font-size:12px;cursor:pointer;padding:7px 11px;border-radius:6px;">✕</button>
          </div>
        </div>
      </div>`;
    });
  } else {
    h+=`<div class="card" style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">No goals yet. Set a target and start building toward it.</div>`;
  }
  h+=`<div class="row" style="margin:16px 0 10px;">
    <span class="sec" style="margin:0;">Bucket List 🪣</span>
    <button onclick="openModal('add-bucket')" style="display:flex;align-items:center;gap:5px;background:var(--purple-tint);color:var(--purple-ink);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Add Dream
    </button>
  </div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Things to do, see, or experience when you're financially free.</p>`;
  if(bucket.length){
    bucket.forEach(b=>{
      h+=`<div class="card row" style="padding:12px 16px;${b.done?"opacity:.65":""}">
        <div style="display:flex;gap:12px;align-items:center;flex:1;">
          <button onclick="toggleBucket('${b.id}')" style="width:22px;height:22px;border-radius:6px;border:2px solid ${b.done?"#7C3AED":"#D3D1C7"};background:${b.done?"#7C3AED":"transparent"};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
            ${b.done?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:""}
          </button>
          <p style="font-size:13px;margin:0;text-decoration:${b.done?"line-through":"none"};color:${b.done?"var(--muted)":"var(--text)"};">${b.text}</p>
        </div>
        <button onclick="delBucket('${b.id}')" style="border:1px solid var(--border);background:none;color:#D85A30;font-size:12px;border-radius:6px;padding:7px 11px;cursor:pointer;margin-left:8px;flex-shrink:0;">✕</button>
      </div>`;
    });
  } else {
    h+=`<div class="card" style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">Your dream list is empty. What are you working toward?</div>`;
  }
  return h;
}

/* ── MINDSET ────────────────────────────────── */
function vMindset(){
  const rem=debts.reduce((s,d)=>s+d.remaining,0);
  const readCount=lessonsRead.length;
  let h=`<button onclick="enterLearn()" style="width:100%;margin-bottom:10px;padding:14px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;border-radius:11px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">📚</div>
      <div style="text-align:left;">
        <div style="font-size:15px;font-weight:700;">Learn</div>
        <div style="font-size:12px;color:var(--muted);margin-top:1px;">Money lessons, your real numbers · ${readCount}/${LESSONS.length} read</div>
      </div>
    </div>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B8B7B2" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button onclick="openModal('impulse',${rem})" style="width:100%;margin-bottom:16px;padding:16px;background:linear-gradient(135deg,#D97706,var(--amber-ink));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 14px rgba(217,119,6,.4);">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Impulse Check, Before You Buy
  </button>
  <p class="sec">My Money Rules</p>
  <div class="card">`;
  rules.forEach((r,i)=>{
    h+=`<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:${i<rules.length-1?"1px solid #F0EFE9":"none"};">
      <div style="width:22px;height:22px;border-radius:50%;background:var(--amber-tint);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
        <span style="font-size:10px;font-weight:700;color:#D97706;">${i+1}</span>
      </div>
      <p style="font-size:13px;color:var(--text);margin:0;flex:1;line-height:1.5;">${r}</p>
      <button onclick="delRule(${i})" style="border:none;background:none;color:var(--border);font-size:14px;cursor:pointer;padding:0;flex-shrink:0;">✕</button>
    </div>`;
  });
  h+=`<button onclick="openModal('add-rule')" style="width:100%;margin-top:10px;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;">+ Add a personal rule</button>
  </div>
  <p class="sec">Wins Journal 🏆</p>
  <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Log every financial win, big or small. It builds momentum.</p>
  <button onclick="openModal('add-win')" style="width:100%;margin-bottom:12px;padding:11px;background:var(--amber-tint);border:1px solid #FCD34D;border-radius:10px;color:var(--amber-ink);font-size:13px;font-weight:600;cursor:pointer;">🎉 Log a Financial Win</button>`;
  if(wins.length){
    wins.slice(0,8).forEach(w=>{
      h+=`<div class="card row" style="padding:10px 14px;">
        <div>
          <p style="font-size:13px;color:var(--text);margin:0 0 2px;">${w.text}</p>
          <p style="font-size:11px;color:var(--muted);margin:0;">${w.date}</p>
        </div>
        <button onclick="delWin('${w.id}')" style="border:1px solid var(--border);background:none;color:#D85A30;font-size:12px;border-radius:6px;padding:7px 11px;cursor:pointer;flex-shrink:0;margin-left:8px;">✕</button>
      </div>`;
    });
  } else {
    h+=`<div class="card" style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">No wins yet. Any good financial decision counts. Log one today.</div>`;
  }
  h+=`<button onclick="toggleAllTips()" style="width:100%;margin-top:6px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:700;color:var(--text);">💬 ${showAllTips?"Hide tips":"See all "+TIPS.length+" tips"}</span><span style="font-size:16px;color:var(--muted);transform:rotate(${showAllTips?"90deg":"0deg"});transition:transform .15s;">›</span></button>`;
  if(showAllTips){
    TIPS.forEach(t=>{h+=`<div class="card" style="padding:12px 14px;margin-bottom:6px;margin-top:6px;"><p style="font-size:13px;color:var(--text);line-height:1.55;margin:0;">${t.e} ${t.t}</p></div>`;});
  }
  return h;
}

/* ── MODALS ─────────────────────────────────── */
function openModal(type,...args){
  const handle=`<div class="handle"></div>`;
  let h=handle;
  if(type==="add-debt"){
    h+=`<p style="font-size:16px;font-weight:700;color:var(--text);margin:0 0 16px;">Add New Debt</p>
    <div style="margin-bottom:12px;"><label class="lbl">Debt Name</label><input id="m-dn" class="inp" placeholder="e.g. BDO Credit Card"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Current Balance (${curSym})</label><input id="m-db" type="number" class="inp" placeholder="e.g. 50000"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Type</label>
      <select id="m-dt" class="inp" onchange="document.getElementById('m-dr').value=(DEBT_TYPES[this.value]||{}).rate||0;">
        ${Object.entries(DEBT_TYPES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("")}
      </select>
    </div>
    <div style="margin-bottom:12px;"><label class="lbl">Monthly Interest Rate (%)</label><input id="m-dr" type="number" class="inp" value="2"/></div>
    <div style="margin-bottom:20px;"><label class="lbl">Minimum Monthly Payment (${curSym}), optional</label><input id="m-dm" type="number" class="inp" placeholder="e.g. 2500"/></div>
    <button onclick="doAddDebt()" style="width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Add Debt</button>`;
  }
  else if(type==="log-pay"){
    const d=debts.find(x=>x.id===args[0]);if(!d)return;
    pendingReceipt=null;
    h+=`<p style="font-size:16px;font-weight:700;color:var(--text);margin:0 0 4px;">Log Payment</p>
    <p style="font-size:12px;color:var(--muted);margin:0 0 16px;">${d.name} · ${p$(d.remaining)} remaining</p>
    <div style="margin-bottom:12px;"><label class="lbl">Amount Paid (${curSym})${d.min>0?" · min "+p$(d.min):""}</label>
      <input id="m-pa" type="number" class="inp" value="${d.min>0?Math.min(d.min,d.remaining):''}" placeholder="e.g. 5000" oninput="var v=parseFloat(this.value);var pr=Math.max(0,${d.remaining}-(isNaN(v)?0:v));document.getElementById('m-pp').textContent=isNaN(v)?'':'New remaining: '+pr.toLocaleString('en-PH',{style:'currency',currency:'PHP'});"/>
      <button type="button" onclick="var i=document.getElementById('m-pa');i.value='${d.remaining}';i.dispatchEvent(new Event('input'));" style="margin-top:8px;padding:8px 12px;background:rgba(29,158,117,.12);color:#1D9E75;border:1px solid rgba(29,158,117,.4);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;">Pay full balance (${p$(d.remaining)})</button>
      <p id="m-pp" style="font-size:12px;color:#1D9E75;margin:5px 0 0;font-weight:600;min-height:18px;">${d.min>0?"New remaining: "+(d.remaining-Math.min(d.min,d.remaining)).toLocaleString("en-PH",{style:"currency",currency:"PHP"}):""}</p>
    </div>
    <div style="margin-bottom:12px;"><label class="lbl">Date</label><input id="m-pd" type="date" class="inp" value="${td()}"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Note (optional)</label><input id="m-pn" type="text" class="inp" placeholder="e.g. Monthly minimum"/></div>
    ${trackSources?`<div style="margin-bottom:20px;"><label class="lbl">Pay from</label>
      <select id="m-psrc" class="inp">${moneySources(false).map(s=>`<option value="${s.key}">${s.label}</option>`).join("")}</select>
      <p style="font-size:11px;color:var(--muted);margin:6px 0 0;line-height:1.45;">Picking a savings or e-wallet account deducts the payment from it.</p>
    </div>`:""}
    ${receiptFieldHTML()}
    <button onclick="doLogPay(${d.id})" style="width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Log Payment</button>`;
  }
  else if(type==="edit-debt"){
    const d=debts.find(x=>x.id===args[0]);if(!d)return;
    h+=`<p style="font-size:16px;font-weight:700;color:var(--text);margin:0 0 16px;">Edit Debt</p>
    <div style="margin-bottom:12px;"><label class="lbl">Name</label><input id="m-en" class="inp" value="${d.name}"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Type</label><select id="m-et" class="inp">${Object.entries(DEBT_TYPES).map(([k,v])=>`<option value="${k}" ${d.type===k?"selected":""}>${v.label}</option>`).join("")}</select></div>
    <div style="margin-bottom:12px;"><label class="lbl">Current Remaining (${curSym})</label><input id="m-eb" type="number" class="inp" value="${d.remaining}"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Monthly Interest Rate (%)</label><input id="m-er" type="number" class="inp" value="${d.rate}"/></div>
    <div style="margin-bottom:20px;"><label class="lbl">Minimum Monthly Payment (${curSym})</label><input id="m-em" type="number" class="inp" value="${d.min||''}" placeholder="e.g. 2500"/></div>
    <div style="display:flex;gap:8px;">
      <button onclick="doEditDebt(${d.id})" style="flex:1;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Save</button>
      <button onclick="doDeleteDebt(${d.id})" style="padding:13px 16px;background:var(--red-tint);color:#D85A30;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Delete</button>
    </div>`;
  }
  else if(type==="add-income"||type==="edit-income"){
    const isEdit=type==="edit-income";
    const inc=isEdit?incomes.find(x=>x.id==args[0]):null;
    if(isEdit&&!inc)return;
    const _acct=isEdit?(inc.toAcct||(inc.toWallet?"cash":"none")):"cash";
    const rec=isEdit?inc.recurring:true;
    h+=`<p style="font-size:16px;font-weight:700;color:var(--text);margin:0 0 4px;">${isEdit?"Edit":"Add"} Income Source</p>

      <div id="inc-suggest" style="margin-top:7px;"></div>
    </div>
    <div style="margin-bottom:12px;"><label class="lbl">Type</label>
      <select id="m-it" class="inp">${Object.entries(INCOME_TYPES).map(([k,v])=>`<option value="${k}"${isEdit&&inc.type===k?' selected':''}>${v.e} ${v.l}</option>`).join("")}</select>
    </div>
    <div style="margin-bottom:16px;"><label class="lbl">Amount (${curSym})</label><input id="m-ia2" type="number" class="inp" value="${isEdit?inc.amount:''}" placeholder="e.g. 30000"/></div>

      <div style="display:flex;gap:8px;">
        <button id="inc-btn-r" onclick="document.getElementById('m-ir').value='1';this.style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--blue-tint);color:var(--blue-ink);';document.getElementById('inc-btn-o').style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--muted);';" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;${rec?'background:var(--blue-tint);color:var(--blue-ink);':'background:var(--surface-2);color:var(--muted);'}">🔁 Every month</button>
        <button id="inc-btn-o" onclick="document.getElementById('m-ir').value='0';this.style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--blue-tint);color:var(--blue-ink);';document.getElementById('inc-btn-r').style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--muted);';" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;${!rec?'background:var(--blue-tint);color:var(--blue-ink);':'background:var(--surface-2);color:var(--muted);'}">Just this month</button>
      </div>
      <input type="hidden" id="m-ir" value="${rec?1:0}"/>
      <p style="font-size:11px;color:var(--muted);margin:8px 0 0;line-height:1.4;">Recurring income (like salary) counts every month. One-time income (like a sideline or gift) counts only for ${getMonthLabel(budgetMonth)}.</p>
    </div>
    <div style="margin-bottom:20px;"><label class="lbl">Deposited to</label>
      <select id="m-iacct" class="inp">
        <option value="cash"${_acct==="cash"?" selected":""}>💵 Cash on hand</option>
        ${savings.map(s=>`<option value="sav:${s.id}"${_acct==="sav:"+s.id?" selected":""}>${s.emoji||"🏦"} ${s.name}</option>`).join("")}
        <option value="none"${_acct==="none"?" selected":""}>Not added (budget only)</option>
      </select>
      <p style="font-size:11px;color:var(--muted);margin:6px 0 0;line-height:1.45;">This adds the money to that account so it shows in your assets and net worth. Choose "Not added" to count it in your budget only.</p>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="${isEdit?`doEditIncome('${inc.id}')`:'doAddIncome()'}" style="flex:1;padding:13px;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">${isEdit?"Save":"Add Income"}</button>
      ${isEdit?`<button onclick="delIncome('${inc.id}')" style="padding:13px 16px;background:var(--red-tint);color:#D85A30;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Delete</button>`:''}
    </div>`;
  }
  else if(type==="add-expense"){
    pendingReceipt=null;
    h+=`<p style="font-size:16px;font-weight:700;color:var(--text);margin:0 0 16px;">Add Expense</p>
    <div style="margin-bottom:12px;"><label class="lbl">Description</label><input id="m-en2" class="inp" placeholder="e.g. Jollibee, Grab, Meralco" oninput="suggestExpenseCat(this.value)"/>
      <div id="cat-suggest" style="margin-top:7px;"></div>
    </div>
    <div style="margin-bottom:12px;"><label class="lbl">Amount (${curSym})</label><input id="m-ea" type="number" class="inp" placeholder="e.g. 350"/></div>
    <div style="margin-bottom:12px;"><label class="lbl">Category</label>
      <select id="m-ec" class="inp" onchange="if(this.value==='__addcat__')quickAddCat(this);">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.e} ${v.l}</option>`).join("")}<option value="__addcat__">➕ Add new category…</option></select>
    </div>
    <div style="margin-bottom:12px;"><label class="lbl">Date</label><input id="m-ed" type="date" class="inp" value="${td()}"/></div>
    <div style="margin-bottom:20px;"><label class="lbl">Type</label>
      <div style="display:flex;gap:8px;">
        <button id="btn-n" onclick="document.getElementById('m-ew').value='0';this.style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--green-tint);color:var(--green-ink);';document.getElementById('btn-w').style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--muted);';" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--green-tint);color:var(--green-ink);">Need</button>
        <button id="btn-w" onclick="document.getElementById('m-ew').value='1';this.style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--red-tint);color:var(--red-ink);';document.getElementById('btn-n').style.cssText='flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--muted);';" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface-2);color:var(--muted);">Want</button>
      </div>
      <input type="hidden" id="m-ew" value="0"/>
    </div>

function doAddDebt(){
  const n=(document.getElementById("m-dn").value||"").trim(),b=parseFloat(document.getElementById("m-db").value),t=document.getElementById("m-dt").value,r=parseFloat(document.getElementById("m-dr").value)||0,m=parseFloat(document.getElementById("m-dm").value)||0;
  if(!n||!b||b<=0){flash("Enter a name and valid balance.");return;}
  const newId=Math.max(0,...debts.map(d=>d.id))+1;
  debts.push({id:newId,name:n,original:r2(b),remaining:r2(b),type:t,rate:r,min:r2(m)});
  save();closeModal();render();flash(n+" added.");
}
function doEditDebt(id){
  const d=debts.find(x=>x.id===id);if(!d)return;
  const n=(document.getElementById("m-en").value||"").trim(),b=parseFloat(document.getElementById("m-eb").value),r=parseFloat(document.getElementById("m-er").value)||0,m=parseFloat(document.getElementById("m-em").value)||0;
  if(!n||isNaN(b)||b<0){flash("Enter valid values.");return;}
  d.name=n;d.remaining=r2(b);d.rate=r;d.min=r2(m);d.type=(document.getElementById("m-et")||{}).value||d.type;
  // Keep `original` sensible: if no payments logged yet, treat a balance edit as a correction
  // of the starting figure; otherwise never let original fall below remaining (avoids
  // negative "debt eliminated" in My Journey).
  const hasPayments=payments.some(p=>p.debtId===id);
  if(!hasPayments){d.original=r2(b);}
  else{d.original=Math.max(d.original||0,r2(b));}
  save();closeModal();render();flash("Debt updated.");
}
function setStrategy(s){strategy=s;save();render();flash(s==="snowball"?"Snowball: smallest balance first.":"Avalanche: highest interest first.");}
function doAddRecurring(){
  const n=(document.getElementById("m-rn").value||"").trim(),a=parseFloat(document.getElementById("m-ra").value);
  if(!n||!a||a<=0){flash("Enter a name and amount.");return;}
  const t={id:uid(),name:n,amount:r2(a),cat:document.getElementById("m-rc").value,day:Math.min(28,Math.max(1,parseInt(document.getElementById("m-rd").value)||1)),want:document.getElementById("m-rw").value==="1"};
  recurring.push(t);
  // Immediately log this month's instance
  const ym=ymKey(new Date());
  const day=String(t.day).padStart(2,"0");
  expenses.push({id:uid(),name:t.name,cat:t.cat,amount:t.amount,date:ym+"-"+day,want:t.want,recurId:t.id});
  save();closeModal();render();flash(n+" added as a monthly bill.");
}
function doEditRecurring(tid){
  const t=recurring.find(x=>x.id==tid);if(!t)return;
  const n=(document.getElementById("m-rn").value||"").trim(),a=parseFloat(document.getElementById("m-ra").value);
  if(!n||!a||a<=0){flash("Enter a name and amount.");return;}
  t.name=n;t.amount=r2(a);t.cat=document.getElementById("m-rc").value;t.day=Math.min(28,Math.max(1,parseInt(document.getElementById("m-rd").value)||1));t.want=document.getElementById("m-rw").value==="1";
  // Update this month's matching auto-expense so the change shows now
  const ym=ymKey(new Date());
  const thisMonths=expenses.find(e=>e.recurId===t.id&&(e.date||"").startsWith(ym));
  if(thisMonths){thisMonths.name=t.name;thisMonths.amount=t.amount;thisMonths.cat=t.cat;thisMonths.want=t.want;}
  save();closeModal();render();flash("Recurring bill updated.");
}
function delRecurring(tid){
  if(!confirm("Stop auto-adding this bill? Past entries stay in your history."))return;
  recurring=recurring.filter(t=>t.id!=tid);save();render();flash("Recurring bill removed.");

function backupOverdue(){
  const items=debts.length+expenses.length+payments.length+savings.length;
  if(items<5)return false;                                  // not enough saved to worry about yet
  const sn=parseInt(localStorage.getItem("ps_bksnooze")||"0");
  if(sn&&(Date.now()-sn)<3*864e5)return false;              // snoozed in the last 3 days
  const last=parseInt(localStorage.getItem("ps_lastbackup")||"0");

  return (Date.now()-since)>=14*864e5;                      // 2 weeks since last backup (or first use)

async function doBackupNow(){
  const fname="peso-smart-backup-"+new Date().toISOString().slice(0,10)+".json";
  const blob=new Blob([JSON.stringify(buildBackupObj(),null,2)],{type:"application/json"});
  try{
    const file=new File([blob],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Peso Smart backup"});   // phone: send to Drive, email, Files, etc.
      markBackedUp();render();flash("Backup saved. Keep it somewhere safe.");
      return;
    }
  }catch(e){if(e&&e.name==="AbortError")return;}                          // user closed the share sheet
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    markBackedUp();render();flash("Backup downloaded. Keep it safe.");
  }catch(e){flash("Could not back up.");console.warn(e);}
}

function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      const max=1024;let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}
      else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{cb(cv.toDataURL("image/jpeg",0.5));}catch(e){cb(null);}
    };
    img.onerror=function(){cb(null);};
    img.src=ev.target.result;
  };
  reader.onerror=function(){cb(null);};
  reader.readAsDataURL(file);
}
function localStorageChars(){let n=0;try{for(const k in localStorage){if(Object.prototype.hasOwnProperty.call(localStorage,k))n+=k.length+(localStorage[k]||"").length;}}catch(e){}return n;}
function handleReceiptFile(input){
  const file=input.files&&input.files[0];input.value="";if(!file)return;
  if(!/^image\//.test(file.type||"")){flash("Please choose an image.");return;}
  compressImage(file,function(dataUrl){
    if(!dataUrl){flash("Could not read that image.");return;}
    if(localStorageChars()+dataUrl.length>4000000){flash("Storage is getting full. Remove a few old receipts first.");return;}
    pendingReceipt=dataUrl;
    const box=document.getElementById("receipt-box");if(box)box.innerHTML=receiptBoxInner();
  });
}

/* ── PAYOFF ESTIMATE ────────────────────────── */
function getPayoffEstimate(){
  const rem=debts.reduce((s,d)=>s+d.remaining,0);
  if(debts.length===0)return"";        // new user, no debts entered yet, do not claim debt free
  if(rem<=0)return"🎉 Debt Free!";  // had debts and cleared them all
  const now=new Date();
  let avg=0;
  // Preferred: average of actual monthly payments over the last 6 months
  let totPaid=0,monthsWithPay=0;
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=ymKey(d);
    const mPay=payments.filter(p=>(p.date||"").startsWith(ym)).reduce((s,p)=>s+p.amount,0);
    if(mPay>0){totPaid+=mPay;monthsWithPay++;}
  }
  if(monthsWithPay>0){
    avg=totPaid/monthsWithPay;
  } else {
    // Fallback from day one: whatever surplus the budget implies
    const m=ymKey(new Date());
    const exp=expenses.filter(e=>(e.date||"").startsWith(m)).reduce((s,e)=>s+e.amount,0);
    avg=income-exp;
    if(avg<=0)avg=income*0.2; // last-resort assumption: 20% of income to debt
  }
  if(avg<=0)return null;
  const mLeft=Math.ceil(rem/avg);
  if(mLeft>600)return null; // absurdly far out, do not show
  const target=new Date(now.getFullYear(),now.getMonth()+mLeft,1);
  return target.toLocaleDateString("en-PH",{month:"short",year:"numeric"});
}

function getLifetimeStats(){
  const totalPaid=r2(payments.reduce((s,p)=>s+p.amount,0));
  const origTotal=r2(debts.reduce((s,d)=>s+(d.original||0),0));
  const remTotal=r2(debts.reduce((s,d)=>s+d.remaining,0));
  const eliminated=r2(origTotal-remTotal);
  const pctElim=origTotal>0?(eliminated/origTotal)*100:0;
  const cleared=debts.filter(d=>(d.original||0)>0&&d.remaining<=0.01).length;
  // Interest no longer accruing = monthly interest on cleared debts' original balances
  const intEliminated=r2(debts.filter(d=>d.remaining<=0.01).reduce((s,d)=>s+(d.original||0)*(d.rate||0)/100,0));
  const intStill=r2(debts.reduce((s,d)=>s+d.remaining*(d.rate||0)/100,0));
  // Days on journey from earliest activity date
  let dates=[];
  payments.forEach(p=>{if(p.date)dates.push(p.date);});
  expenses.forEach(e=>{if(e.date)dates.push(e.date);});
  savings.forEach(sv=>(sv.deposits||[]).forEach(x=>{if(x.date)dates.push(x.date);}));
  let days=0;
  if(dates.length){dates.sort();const first=new Date(dates[0]);days=Math.max(0,Math.round((Date.now()-first.getTime())/86400000));}
  const saved=r2(savingsTotal()+otherAssetsTotal());
  const nw=getNetWorth();
  return {totalPaid,origTotal,remTotal,eliminated,pctElim,cleared,intEliminated,intStill,days,saved,net:nw.net,debtCount:debts.length};
}

function drawShareCard(opts,cb){
  try{
    const cv=document.createElement("canvas");cv.width=1080;cv.height=1080;
    const x=cv.getContext("2d");
    const g=x.createLinearGradient(0,0,1080,1080);
    g.addColorStop(0,opts.c1||"#1D9E75");g.addColorStop(1,opts.c2||"#0A5C42");
    x.fillStyle=g;x.fillRect(0,0,1080,1080);
    x.textAlign="center";
    // emoji / icon
    x.font="130px sans-serif";x.fillText(opts.emoji||"🎉",540,300);
    // title
    x.fillStyle="rgba(255,255,255,.85)";x.font="bold 44px sans-serif";
    x.fillText(opts.title||"",540,420);
    // big number
    x.fillStyle="#fff";x.font="bold 130px sans-serif";
    let big=opts.big||"";
    if(big.length>13)x.font="bold 90px sans-serif";
    x.fillText(big,540,600);
    // sub
    x.fillStyle="rgba(255,255,255,.9)";x.font="46px sans-serif";
    x.fillText(opts.sub||"",540,710);
    // footer
    x.fillStyle="rgba(255,255,255,.8)";x.font="bold 40px sans-serif";
    x.fillText("Peso Smart",540,1000);
    cv.toBlob(b=>cb(b),"image/png");
  }catch(e){flash("Could not create the card.");console.warn(e);}
}
async function shareBlob(blob){
  const file=new File([blob],"peso-smart-progress.png",{type:"image/png"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"My Peso Smart progress"});return;}catch(e){if(e&&e.name==="AbortError")return;}
  }
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="peso-smart-progress.png";document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  flash("Progress card saved to your downloads.");
}

function calcCompound(){
  const P=parseFloat(document.getElementById("ci-p").value)||0;
  const PMT=parseFloat(document.getElementById("ci-m").value)||0;
  const annual=parseFloat(document.getElementById("ci-r").value)||0;
  const years=parseFloat(document.getElementById("ci-y").value)||0;
  const r=annual/100/12, n=Math.round(years*12);
  let fv;
  if(r===0){fv=P+PMT*n;}
  else{fv=P*Math.pow(1+r,n)+PMT*((Math.pow(1+r,n)-1)/r);}
  const contributed=r2(P+PMT*n);
  const earned=r2(fv-contributed);
  document.getElementById("ci-result").innerHTML=`<div style="border-top:1px solid #C7D2FE;padding-top:12px;">
    <div class="row" style="margin-bottom:5px;"><span style="font-size:12px;color:var(--purple-ink);">You put in</span><span style="font-size:13px;font-weight:600;color:var(--purple-ink);">${p$(contributed)}</span></div>
    <div class="row" style="margin-bottom:5px;"><span style="font-size:12px;color:var(--purple-ink);">Growth earned</span><span style="font-size:13px;font-weight:700;color:#1D9E75;">${p$(earned)}</span></div>
    <div class="row" style="border-top:1px solid #C7D2FE;padding-top:8px;margin-top:4px;"><span style="font-size:13px;font-weight:700;color:var(--purple-ink);">After ${years} years</span><span style="font-size:18px;font-weight:800;color:#312E81;">${p$(r2(fv))}</span></div>
  </div>`;
}

  focus.remaining=r2(focus.remaining-act);

  const pay={id:uid(),debtId:focus.id,debtName:focus.name,amount:act,date:td(),note:"Payday extra",source:src};

function savingsBalance(sv){
  const _inc=incomes.filter(i=>i.toAcct===("sav:"+sv.id)).reduce((a,i)=>a+i.amount,0);
  return r2((sv.deposits||[]).reduce((a,d)=>a+d.amount,0)-(sv.withdrawals||[]).reduce((a,w)=>a+w.amount,0)+_inc);
}
/* ── PAYMENT METHOD / SOURCE ENGINE ─────────── */
// Pickable money sources. includeCharge=true also lists credit cards / BNPL you can charge to.
function moneySources(includeCharge){
  const list=[{key:"cash",label:"💵 Cash on hand ("+p$(getWallet())+")"}];
  savings.forEach(s=>list.push({key:"sav:"+s.id,label:(s.emoji||"💰")+" "+s.name}));
  otherAssets.forEach(a=>list.push({key:"ast:"+a.id,label:(a.emoji||"💵")+" "+a.name}));
  if(includeCharge){
    debts.filter(d=>d.type==="cc"||d.type==="bnpl").forEach(d=>{
      list.push({key:"cc:"+d.id,label:(d.type==="cc"?"💳 ":"🛍️ ")+d.name});
    });
  }
  return list;
}
// Friendly label for a stored source key
function sourceLabel(key){
  if(!key||key==="cash")return "💵 Cash";
  const f=moneySources(true).find(x=>x.key===key);
  return f?f.label:"💵 Cash";
}
// Move money out of (sign +1) or back into (sign -1) a savings/e-wallet source. Cash has no tracked effect.
function moveFromSource(key,amt,sign,refId,note,date){
  if(!key||key==="cash")return;
  if(key.startsWith("sav:")){
    const s=savings.find(x=>x.id==key.slice(4));if(!s)return;
    s.withdrawals=s.withdrawals||[];
    if(sign>0){s.withdrawals.push({id:uid(),amount:r2(amt),date:date||td(),ref:refId,note:note||"Withdrawal"});}
    else{s.withdrawals=s.withdrawals.filter(w=>w.ref!==refId);}
  } else if(key.startsWith("ast:")){
    const a=otherAssets.find(x=>x.id==key.slice(4));if(!a)return;
    a.value=r2((a.value||0)-sign*amt);
  }
}
// Apply (dir +1) or reverse (dir -1) the funding effect of an expense.
function applyExpenseFunding(exp,dir){
  const key=exp.method||"cash",amt=exp.amount;
  if(key.startsWith("cc:")){               // charged to a credit card / BNPL -> that balance grows
    const d=debts.find(x=>x.id==key.slice(3));
    if(d)d.remaining=r2(Math.max(0,d.remaining+dir*amt));
  } else {                                 // paid from cash / savings / e-wallet
    moveFromSource(key,amt,dir,exp.id,exp.name,exp.date);
  }
}
// Apply/reverse the funding source of a debt payment.
function applyPaymentFunding(pay,dir){
  moveFromSource(pay.source||"cash",pay.amount,dir,pay.id,"Paid "+(pay.debtName||"debt"),pay.date);
}
function getWallet(){
  // Money the user moved OUT of savings back into cash (plain withdrawals only).
  const savToCash=r2(savings.reduce((s,sv)=>s+(sv.withdrawals||[]).filter(w=>!w.ref).reduce((a,w)=>a+w.amount,0),0));
  // Money the user moved FROM cash into savings (every deposit is a cash->savings transfer).
  const cashToSav=r2(savings.reduce((s,sv)=>s+(sv.deposits||[]).filter(d=>!d.opening).reduce((a,d)=>a+d.amount,0),0));
  const cashIn=r2(
    cashTopups.reduce((s,t)=>s+t.amount,0)+
    incomes.filter(i=>i.toAcct==="cash"||(i.toAcct==null&&i.toWallet)).reduce((s,i)=>s+i.amount,0)+
    savToCash
  );
  const cashOut=r2(
    expenses.filter(e=>e.method==="cash").reduce((s,e)=>s+e.amount,0)+
    payments.filter(p=>p.source==="cash").reduce((s,p)=>s+p.amount,0)+
    cashToSav
  );
  return r2(cashIn-cashOut);
}
function getNetWorth(){
  const assets=r2(savingsTotal()+otherAssetsTotal()+getWallet()+bankCash);
  const liabilities=r2(debts.reduce((s,d)=>s+d.remaining,0));
  return {assets,liabilities,net:r2(assets-liabilities)};
}
// Reconstruct net worth at the end of each of the last 6 months from logged activity
function getNetWorthTrend(){
  const now=new Date();
  const cur=getNetWorth();
  const curDebt=cur.liabilities, curSav=savingsTotal(), oa=otherAssetsTotal();
  const labels=[],values=[];
  for(let i=5;i>=0;i--){
    const monthStart=new Date(now.getFullYear(),now.getMonth()-i,1);
    const boundary=new Date(now.getFullYear(),now.getMonth()-i+1,1); // first day of the month AFTER monthStart
    let payAfter=0,depAfter=0,wdAfter=0;
    payments.forEach(p=>{if(p.date&&new Date(p.date)>=boundary)payAfter+=p.amount;});
    savings.forEach(sv=>{
      (sv.deposits||[]).forEach(x=>{if(x.date&&new Date(x.date)>=boundary)depAfter+=x.amount;});
      (sv.withdrawals||[]).forEach(x=>{if(x.date&&new Date(x.date)>=boundary)wdAfter+=x.amount;});
    });
    const debtAtM=curDebt+payAfter;            // debt was higher before later payments
    const savAtM=curSav-depAfter+wdAfter;       // savings was lower before later deposits
    labels.push(monthStart.toLocaleDateString("en-PH",{month:"short"}));
    values.push(r2(savAtM+oa-debtAtM));         // other assets held constant (no dated history)
  }
  return {labels,values};
}

  </div>`;
}

  if(savings.length){
    savings.forEach(sv=>{h+=stmtRow(brandBadge(sv.brand,sv.emoji)+" "+sv.name,savingsBalance(sv),{indent:true});anyAsset=true;});

  if(otherAssets.length){
    otherAssets.forEach(a=>{h+=`<div onclick="openModal('edit-asset','${a.id}')" style="cursor:pointer;">${stmtRow(brandBadge(a.brand,a.emoji)+" "+a.name+" ✎",a.value,{indent:true})}</div>`;anyAsset=true;});

  const sortedDebts=[...debts].filter(d=>d.remaining>0).sort((a,b)=>b.remaining-a.remaining);
  if(sortedDebts.length){
    sortedDebts.forEach(d=>{h+=stmtRow(d.name,d.remaining,{indent:true});});
  } else {
    h+=`<p style="font-size:12px;color:#1D9E75;padding:5px 0 5px 14px;margin:0;font-weight:600;">🎉 No liabilities. Debt free!</p>`;
  }
  h+=stmtRow("Total Liabilities",nw.liabilities,{bold:true,top:true,color:"#D85A30",labelColor:"var(--text)"});

  h+=`<div style="margin-top:14px;padding-top:12px;border-top:2.5px solid var(--text);">
    ${stmtRow("NET WORTH",nw.net,{bold:true,big:true,color:nw.net>=0?"#0F766E":"#D85A30",labelColor:"var(--text)"})}

  // ── INCOME STATEMENT ──

  h+=`<div style="margin-top:14px;padding-top:12px;border-top:2.5px solid var(--text);">
    ${stmtRow("NET INCOME",netIncome,{bold:true,big:true,color:netIncome>=0?"#0F766E":"#D85A30",labelColor:"var(--text)"})}

  </div>`;

  // Allocation of surplus (not expenses — balance-sheet movements)
  h+=`<p style="font-size:11px;font-weight:700;color:#6B6A66;text-transform:uppercase;letter-spacing:.05em;margin:18px 0 2px;">Where the surplus went</p>

    ${stmtRow("→ Savings set aside",saved,{indent:true,color:"#3B82F6"})}
    ${stmtRow(freeCash>=0?"→ Free cash / buffer":"→ Drawn from cash",freeCash,{indent:true,top:true,bold:true,color:freeCash>=0?"var(--text)":"#D85A30",labelColor:"var(--text)"})}
  </div>`;

  // ── CASH FLOW STATEMENT (cash basis; credit purchases shown as financing) ──
  h+=`<div class="card" style="padding:18px;margin-bottom:16px;">
    <p style="font-size:13px;font-weight:800;color:#0F766E;text-transform:uppercase;letter-spacing:.06em;margin:0 0 2px;">Cash Flow Statement</p>
    <p style="font-size:11px;color:var(--muted);margin:0 0 14px;">For ${getMonthLabel(budgetMonth)} · actual cash moving in and out</p>

    <p style="font-size:11px;font-weight:700;color:#1D9E75;text-transform:uppercase;letter-spacing:.05em;margin:0 0 2px;">Cash coming in</p>
    ${stmtRow("Cash received",cfIn,{indent:true,color:"#1D9E75"})}
    ${stmtRow("Total cash in",cfIn,{bold:true,top:true,color:"#1D9E75",labelColor:"var(--text)"})}

    <p style="font-size:11px;font-weight:700;color:#D85A30;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 2px;">Cash going out</p>
    ${stmtRow("Cash spending",cfCashExp,{indent:true,color:"#D85A30"})}
    ${stmtRow("Debt paid in cash",cfDebt,{indent:true,color:"#D85A30"})}
    ${stmtRow("Total cash out",cfOut,{bold:true,top:true,color:"#D85A30",labelColor:"var(--text)"})}

    <div style="margin-top:14px;padding-top:12px;border-top:2.5px solid var(--text);">
      ${stmtRow("NET CASH FLOW",cfNet,{bold:true,big:true,color:cfNet>=0?"#0F766E":"#D85A30",labelColor:"var(--text)"})}
      <p style="font-size:11px;color:var(--muted);margin:6px 0 0;line-height:1.5;">${cfNet>=0?"More cash came in than went out. The surplus can build savings or attack debt.":"More cash went out than came in. You drew down cash or leaned on credit to cover the gap."}</p>
    </div>

    ${(cfSaved>0||cfCredit>0||cfAcctOut>0)?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--divider);">
      <p style="font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px;font-weight:700;">Notes</p>
      ${cfSaved>0?`<p style="font-size:11px;color:var(--muted);margin:0 0 4px;line-height:1.5;">You moved ${p$(cfSaved)} into savings. That is still your money, just set aside, so it is not counted as spent.</p>`:""}
      ${cfAcctOut>0?`<p style="font-size:11px;color:var(--muted);margin:0 0 4px;line-height:1.5;">You paid ${p$(cfAcctOut)} from savings or other accounts. That left those accounts, not your cash, so it is not in cash out above.</p>`:""}
      ${cfCredit>0?`<p style="font-size:11px;color:var(--muted);margin:0;line-height:1.5;">You charged ${p$(cfCredit)} to credit cards. That is financed, not cash out this month, but it increased what you owe and will be paid later.</p>`:""}
    </div>`:""}
  </div>`;
  }

  h+=`<p style="text-align:center;font-size:10px;color:var(--faint);margin:20px 0 4px;letter-spacing:.04em;">Peso Smart ${APP_VERSION}</p>`;
  return h;
}

/* ── BACKUP & RESTORE ───────────────────────── */
function doExportData(){
  try{
    const backup={
      _app:"PesoSmart",
      _version:5,
      _exportedAt:new Date().toISOString(),
      debts:debts,
      payments:payments,
      budget:{income,incomes,expenses,savings,recurring,otherAssets,caps,payday,cashTopups,customCats,incTypes:customIncs,quickAdds,monthlyBudget,bankCash,currency:curCode},
      goals:{goals,bucket,wins,rules,strategy,lessonsRead,setupDone}
    };
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const stamp=new Date().toISOString().slice(0,10);
    a.href=url;a.download="peso-smart-backup-"+stamp+".json";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    flash("Backup downloaded. Keep it safe!");
  }catch(e){flash("Could not create backup.");console.warn(e);}
}
function dl(filename,text,mime){
  try{
    const blob=new Blob([text],{type:mime||"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(e){flash("Could not create the file.");console.warn(e);}
}
function csvCell(v){v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function csvRows(rows){return "\ufeff"+rows.map(r=>r.map(csvCell).join(",")).join("\r\n");}
function acctName(key){return sourceLabel(key).replace(/^\S+\s/,"");}
function doExportCSV(kind){
  const stamp=ymKey(new Date());
  if(kind==="debts"){
    const rows=[["Name","Type","Original Balance","Current Balance","Monthly Rate %","Minimum Payment"]];
    debts.forEach(d=>rows.push([d.name,(DEBT_TYPES[d.type]||{}).label||d.type,r2(d.original||0),r2(d.remaining||0),d.rate||0,r2(d.min||0)]));
    dl("peso-smart-debts-"+stamp+".csv",csvRows(rows),"text/csv");
    flash("Debts exported to CSV.");return;
  }
  const tx=[];
  expenses.forEach(e=>tx.push([e.date,"Expense",e.name,(CATS[e.cat]||CATS.other).l,e.want?"Want":"Need",r2(e.amount),acctName(e.method)]));
  incomes.forEach(i=>{const dt=i.recurring?"":(i.month?i.month+"-01":"");tx.push([dt,i.recurring?"Income (monthly)":"Income",i.name,(INCOME_TYPES[i.type]||INCOME_TYPES.other).l,"",r2(i.amount),""]);});
  payments.forEach(p=>tx.push([p.date,"Debt Payment",p.debtName,"",(p.note||""),r2(p.amount),acctName(p.source)]));
  savings.forEach(s=>{(s.deposits||[]).forEach(d=>tx.push([d.date,"Savings In",s.name,"","Deposit",r2(d.amount),""]));(s.withdrawals||[]).forEach(w=>{if(!w.ref)tx.push([w.date,"Savings Out",s.name,"",(w.note||"Withdrawal"),r2(w.amount),""]);});});
  tx.sort((a,b)=>String(b[0]||"").localeCompare(String(a[0]||"")));
  const rows=[["Date","Type","Description","Category","Need/Want","Amount (PHP)","Account/Method"],...tx];
  dl("peso-smart-transactions-"+stamp+".csv",csvRows(rows),"text/csv");
  flash("Transactions exported to CSV.");
}

function doImportData(input){

      if(data._app!=="PesoSmart"||!data.debts){

      if(!confirm("This will REPLACE all your current data with the backup. Continue?")){input.value="";return;}
      debts=data.debts||[];

      if(data.budget){income=data.budget.income||0;incomes=data.budget.incomes||[];expenses=data.budget.expenses||[];savings=data.budget.savings||[];recurring=data.budget.recurring||[];otherAssets=data.budget.otherAssets||[];caps=data.budget.caps||{};payday=data.budget.payday||{month:"",steps:[false,false,false,false]};cashTopups=data.budget.cashTopups||[];bankCash=data.budget.bankCash||0;curCode=CURRENCIES[data.budget.currency]?data.budget.currency:"PHP";curSym=CURRENCIES[curCode].sym;}
      if(data.goals){goals=data.goals.goals||[];bucket=data.goals.bucket||[];wins=data.goals.wins||[];rules=data.goals.rules||[...DEFAULT_RULES];strategy=data.goals.strategy||"snowball";lessonsRead=data.goals.lessonsRead||[];setupDone=true;}
      if(data.budget){customCats=data.budget.customCats||{};customIncs=data.budget.incTypes||{};quickAdds=Array.isArray(data.budget.quickAdds)?data.budget.quickAdds:quickAdds;monthlyBudget=(typeof data.budget.monthlyBudget==="number")?data.budget.monthlyBudget:monthlyBudget;trackSources=(typeof data.budget.trackSources==="boolean")?data.budget.trackSources:trackSources;showDetail=(typeof data.budget.showDetail==="boolean")?data.budget.showDetail:showDetail;Object.assign(CATS,customCats);Object.assign(INCOME_TYPES,customIncs);}
      save();render();flash("Data restored successfully! 🎉");
    }catch(e){flash("Could not read that file. Is it a valid backup?");console.warn(e);}
    input.value="";
  };
  reader.readAsText(file);
}

function migrateBankCash(){
  // One-time: fold the old single "Cash in bank" balance into a named bank account so
  // money can be split across multiple banks. Opening deposit keeps cash on hand untouched.
  if(bankCash&&bankCash>0){
    savings=savings||[];
    savings.push({id:uid(),name:"Bank account",emoji:"🏦",brand:null,kind:"checking",target:0,deposits:[{id:uid(),amount:r2(bankCash),date:td(),opening:true,note:"Starting balance"}],withdrawals:[]});
    bankCash=0;save();
  }
}
